<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>泰文生字朗讀（手機優化版）</title>
<style>
  :root{--gap:8px;--btn-radius:8px}
  body {
    font-family: Arial, sans-serif;
    padding: 10px;
    background: #f7f7f7;
    margin: 0;
    -webkit-tap-highlight-color: transparent;
  }
  h1,h2 { font-size:16px; margin:12px 0 6px; text-align:center; }
  .grid { display:flex; flex-wrap:wrap; gap:var(--gap); justify-content:center; }
  .grid button, .reviewBtn {
    flex: 1 1 45%;
    min-width:120px;
    padding:14px;
    font-size:14px;
    border-radius:var(--btn-radius);
    border:1px solid #ccc;
    background:#fff;
    cursor:pointer;
    text-align:center;
    box-sizing:border-box;
  }
  .grid button span { display:block; font-size:12px; color:#666; margin-top:4px; }
  #buttons, #reviewArea {
    max-height:40vh;
    overflow-y:auto;
    border:1px solid #ccc;
    padding:8px;
    background:#fff;
    border-radius:6px;
  }
  #reviewArea { margin-top:10px; border:2px dashed #999; background:#fafafa; }
  .controls { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
  input[type="text"], textarea {
    width:100%;
    padding:10px;
    margin-top:8px;
    font-size:14px;
    border-radius:6px;
    border:1px solid #ccc;
    box-sizing:border-box;
  }
  textarea { height:120px; font-family:monospace; }
  button { margin-top:8px; padding:10px 14px; border-radius:6px; }
  #saveBtn { font-weight:700; box-shadow:0 0 8px rgba(0,0,0,0.12); }
  .small { padding:8px 10px; font-size:13px; }
  @media(min-width:700px){
    .grid button, .reviewBtn { flex:1 1 22%; }
  }
  /* touch feedback */
  button:active { transform:translateY(1px); }
</style>
</head>
<body>

<h1>點擊按鈕朗讀泰文生字</h1>
<div class="grid" id="buttons"></div>

<h2>重溫區域</h2>
<div class="controls">
  <button id="clearReviewBtn" class="small">清除重溫區域</button>
  <button id="saveBtn" class="small">儲存按鈕</button>
</div>
<div id="reviewArea"><p>長按按鈕加入或移除</p></div>

<h2>新增泰文與中文解釋</h2>
<input type="text" id="thaiInput" placeholder="輸入泰文">
<input type="text" id="chineseInput" placeholder="輸入中文解釋">
<div class="controls">
  <button id="generateBtn">生成按鈕</button>
</div>

<h2>新增中文解釋（自動翻譯成泰文）</h2>
<input type="text" id="chineseOnlyInput" placeholder="只輸入中文解釋，按下自動翻譯並生成按鈕">
<div class="controls">
  <button id="autoTranslateBtn">自動翻譯並生成按鈕</button>
</div>

<h2>編輯目前生字清單（進階）</h2>
<textarea id="editArea" placeholder='格式範例: [{"th":"ดูหนัง","zh":"看電影"}]'></textarea>
<div class="controls">
  <button id="updateBtn">更新清單</button>
</div>

<script>
/* ===== data & load ===== */
let words = [
  { th: "ดูหนัง", zh: "看電影" },
  { th: "เรียน", zh: "學習" },
  { th: "เป็นหมอ", zh: "當醫生" },
  { th: "พักผ่อน", zh: "休息" }
];
let reviewWords = [];

/* load saved */
try {
  const saved = localStorage.getItem("thaiWords");
  if (saved) words = JSON.parse(saved);
} catch(e){ console.warn("load thaiWords failed", e); }
try {
  const savedR = localStorage.getItem("reviewWords");
  if (savedR) reviewWords = JSON.parse(savedR);
} catch(e){ console.warn("load reviewWords failed", e); }

/* elements */
const buttonsDiv = document.getElementById('buttons');
const reviewArea = document.getElementById('reviewArea');

/* ===== utilities ===== */
function speak(text){
  try {
    const audio = new Audio(
      "https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&q=" +
      encodeURIComponent(text) +
      "&tl=th"
    );
    audio.play().catch(()=>{/* ignore play errors */});
  } catch(err){
    console.error("TTS error", err);
  }
}
function saveAll(){
  try { localStorage.setItem("thaiWords", JSON.stringify(words)); } catch(e){}
  try { localStorage.setItem("reviewWords", JSON.stringify(reviewWords)); } catch(e){}
}

/* ===== render ===== */
function renderButtons(){
  buttonsDiv.innerHTML = '';
  if (!words.length) {
    buttonsDiv.innerHTML = '<p style="color:#666">目前沒有生字，請新增。</p>';
    updateEditArea();
    renderReviewButtons();
    return;
  }
  words.forEach((w, index) => {
    const btn = document.createElement('button');
    btn.innerHTML = `${escapeHtml(w.th)}<span>${escapeHtml(w.zh)}</span>`;
    btn.dataset.index = index;

    // tap: speak + copy
    btn.addEventListener('click', () => {
      speak(w.th);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(w.th).catch(()=>{});
      }
    });

    // long-press / contextmenu to add to review (works on mobile as long-press)
    btn.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      if (!reviewWords.some(r => r.th === w.th)) {
        reviewWords.push(w);
        renderReviewButtons();
      }
    });

    // small "add to review" affordance for touch users: double-tap adds
    let lastTap = 0;
    btn.addEventListener('touchend', (e) => {
      const now = Date.now();
      if (now - lastTap < 300) {
        if (!reviewWords.some(r => r.th === w.th)) {
          reviewWords.push(w);
          renderReviewButtons();
        }
      }
      lastTap = now;
    });

    buttonsDiv.appendChild(btn);
  });
  updateEditArea();
  renderReviewButtons();
}

function renderReviewButtons(){
  reviewArea.innerHTML = '<p style="color:#666">長按按鈕加入或移除</p>';
  if (!reviewWords.length) return;
  reviewWords.forEach((w, index) => {
    const rb = document.createElement('button');
    rb.className = 'reviewBtn';
    rb.textContent = `${w.th} (${w.zh})`;

    rb.addEventListener('click', () => {
      speak(w.th);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(w.th).catch(()=>{});
      }
    });

    rb.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      reviewWords.splice(index, 1);
      renderReviewButtons();
    });

    // double-tap remove for touch
    let lastTap = 0;
    rb.addEventListener('touchend', () => {
      const now = Date.now();
      if (now - lastTap < 300) {
        reviewWords.splice(index, 1);
        renderReviewButtons();
      }
      lastTap = now;
    });

    reviewArea.appendChild(rb);
  });
}

/* ===== helpers ===== */
function updateEditArea(){
  document.getElementById('editArea').value = JSON.stringify(words, null, 2);
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, (m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
}

/* ===== actions ===== */
// generate from manual inputs
document.getElementById('generateBtn').addEventListener('click', () => {
  const th = document.getElementById('thaiInput').value.trim();
  const zh = document.getElementById('chineseInput').value.trim();
  if (!th || !zh) { alert("請輸入完整的泰文與中文解釋"); return; }
  words.push({ th, zh });
  renderButtons();
  document.getElementById('thaiInput').value = '';
  document.getElementById('chineseInput').value = '';
});

// auto-translate: defensive parsing and fallback
document.getElementById('autoTranslateBtn').addEventListener('click', async () => {
  const zh = document.getElementById('chineseOnlyInput').value.trim();
  if (!zh) { alert("請輸入中文解釋"); return; }

  // show temporary disabled state
  const btn = document.getElementById('autoTranslateBtn');
  btn.disabled = true;
  btn.textContent = '翻譯中...';

  try {
    // Use Google translate public endpoint (may be rate-limited or blocked by CORS in some environments)
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=th&dt=t&q=${encodeURIComponent(zh)}`;
    const res = await fetch(url);
    // If response is not JSON, try to read text and attempt to parse
    let data;
    try { data = await res.json(); } catch (e) {
      const txt = await res.text();
      try { data = JSON.parse(txt); } catch (e2) { data = null; }
    }

    // Defensive parsing
    let th = "";
    if (Array.isArray(data) && Array.isArray(data[0]) && Array.isArray(data[0][0])) {
      th = data[0][0][0] || "";
    } else if (Array.isArray(data) && typeof data[0] === 'string') {
      // sometimes returns simpler structure
      th = data[0];
    }

    // fallback: if no translation, try a very simple heuristic (not ideal)
    if (!th) {
      // try to extract any string in the response
      const flat = JSON.stringify(data || "");
      const match = flat.match(/"([^"]+)"/);
      if (match) th = match[1];
    }

    if (!th) {
      alert("翻譯失敗，請稍後再試或改用手動輸入泰文");
      return;
    }

    words.push({ th, zh });
    renderButtons();
    document.getElementById('chineseOnlyInput').value = '';
  } catch (err) {
    console.error("translate error", err);
    alert("翻譯失敗，請稍後再試或改用手動輸入泰文");
  } finally {
    btn.disabled = false;
    btn.textContent = '自動翻譯並生成按鈕';
  }
});

// save to localStorage
document.getElementById('saveBtn').addEventListener('click', () => {
  saveAll();
  alert("已儲存，下次開啟仍會看到這些按鈕！");
});

// update from edit area
document.getElementById('updateBtn').addEventListener('click', () => {
  try {
    const newWords = JSON.parse(document.getElementById('editArea').value);
    if (!Array.isArray(newWords)) { alert("格式錯誤，必須是陣列"); return; }
    // basic validation
    for (const item of newWords) {
      if (typeof item.th !== 'string' || typeof item.zh !== 'string') {
        alert("每個項目必須包含 th 與 zh 字串欄位");
        return;
      }
    }
    words = newWords;
    renderButtons();
  } catch (e) {
    alert("JSON 格式錯誤，請檢查編輯內容");
  }
});




// clear review
document.getElementById('clearReviewBtn').addEventListener('click', () => {
  if (!reviewWords.length) return;
  if (!confirm("確定要清除重溫區域嗎？")) return;
  reviewWords = [];
  renderReviewButtons();
  try { localStorage.removeItem("reviewWords"); } catch(e){}
});

// before unload: warn if unsaved changes
window.addEventListener("beforeunload", function (e) {
  try {
    const saved = localStorage.getItem("thaiWords");
    if (saved !== JSON.stringify(words)) {
      e.preventDefault();
      e.returnValue = "";
    }
  } catch(e){}
});

/* initial render */
renderButtons();
</script>
</body>
</html>
