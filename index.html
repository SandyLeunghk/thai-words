<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>泰文生字朗讀（手機優化版）</title>
<style>
  :root{--gap:8px;--btn-radius:8px}
  body {
    font-family: Arial, sans-serif;
    padding: 10px;
    background: #f7f7f7;
    margin: 0;
    -webkit-tap-highlight-color: transparent;
  }
  h1,h2 { font-size:16px; margin:12px 0 6px; text-align:center; }
  .grid { display:flex; flex-wrap:wrap; gap:var(--gap); justify-content:center; }
  /* 主要按鈕樣式，禁止文字選取以避免長按選取 */
  .word-btn, .reviewBtn {
    position: relative;
    flex: 1 1 45%;
    min-width:120px;
    padding:14px 40px 14px 14px; /* 留空間給右側小按鈕 */
    font-size:14px;
    border-radius:var(--btn-radius);
    border:1px solid #ccc;
    background:#fff;
    cursor:pointer;
    text-align:left;
    box-sizing:border-box;
    -webkit-user-select: none;
    -ms-user-select: none;
    user-select: none;
    overflow: hidden;
  }
  .word-btn span { display:block; font-size:12px; color:#666; margin-top:4px; }
  /* 小的加入/移除按鈕（右上角） */
  .toggle-review {
    position: absolute;
    right: 8px;
    top: 8px;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid #bbb;
    background: #fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    font-size:16px;
    line-height:1;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    -webkit-user-select: none;
    user-select: none;
  }
  .toggle-review.added { background:#ffd; border-color:#d4a017; }
  #buttons, #reviewArea {
    max-height:40vh;
    overflow-y:auto;
    border:1px solid #ccc;
    padding:8px;
    background:#fff;
    border-radius:6px;
  }
  #reviewArea { margin-top:10px; border:2px dashed #999; background:#fafafa; }
  .controls { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
  input[type="text"], textarea {
    width:100%;
    padding:10px;
    margin-top:8px;
    font-size:14px;
    border-radius:6px;
    border:1px solid #ccc;
    box-sizing:border-box;
  }
  textarea { height:120px; font-family:monospace; }
  button { margin-top:8px; padding:10px 14px; border-radius:6px; }
  #saveBtn { font-weight:700; box-shadow:0 0 8px rgba(0,0,0,0.12); }
  .small { padding:8px 10px; font-size:13px; }
  @media(min-width:700px){ .word-btn, .reviewBtn { flex:1 1 22%; } }
  button:active { transform:translateY(1px); }
</style>
</head>
<body>

<h1>點擊按鈕朗讀泰文生字</h1>
<div class="grid" id="buttons"></div>

<h2>重溫區域</h2>
<div class="controls">
  <button id="clearReviewBtn" class="small">清除重溫區域</button>
  <button id="saveBtn" class="small">儲存按鈕</button>
</div>
<div id="reviewArea"><p style="color:#666">點擊右上星號加入或移除，或點按單字朗讀</p></div>

<h2>新增泰文與中文解釋</h2>
<input type="text" id="thaiInput" placeholder="輸入泰文">
<input type="text" id="chineseInput" placeholder="輸入中文解釋">
<div class="controls">
  <button id="generateBtn">生成按鈕</button>
</div>

<h2>新增中文解釋（自動翻譯成泰文）</h2>
<input type="text" id="chineseOnlyInput" placeholder="只輸入中文解釋，按下自動翻譯並生成按鈕">
<div class="controls">
  <button id="autoTranslateBtn">自動翻譯並生成按鈕</button>
</div>

<h2>編輯目前生字清單（進階）</h2>
<textarea id="editArea" placeholder='格式範例: [{"th":"ดูหนัง","zh":"看電影"}]'></textarea>
<div class="controls">
  <button id="updateBtn">更新清單</button>
</div>

<script>
/* ===== data & load ===== */
let words = [
  { th: "ดูหนัง", zh: "看電影" },
  { th: "เรียน", zh: "學習" },
  { th: "เป็นหมอ", zh: "當醫生" },
  { th: "พักผ่อน", zh: "休息" }
];
let reviewWords = [];

try {
  const saved = localStorage.getItem("thaiWords");
  if (saved) words = JSON.parse(saved);
} catch(e){ console.warn("load thaiWords failed", e); }
try {
  const savedR = localStorage.getItem("reviewWords");
  if (savedR) reviewWords = JSON.parse(savedR);
} catch(e){ console.warn("load reviewWords failed", e); }

const buttonsDiv = document.getElementById('buttons');
const reviewArea = document.getElementById('reviewArea');

/* ===== speak using SpeechSynthesis first ===== */
// 優先使用 SpeechSynthesis，若不可用再退回 Audio
function speak(text) {
  // 優先使用瀏覽器內建語音合成
  if ('speechSynthesis' in window) {
    try {
      // 取消任何正在播放的語音，避免重疊
      window.speechSynthesis.cancel();

      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'th-TH'; // 設為泰語
      utter.rate = 0.95;
      utter.pitch = 1;
      utter.volume = 1;

      // 若裝置沒有泰語語音，瀏覽器會選擇最接近的語音
      window.speechSynthesis.speak(utter);
      return;
    } catch (e) {
      console.warn('speechSynthesis error', e);
    }
  }

  // 備援：使用 Google TTS 音檔（注意 CORS 與可用性）
  try {
    const url = "https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&q=" +
                encodeURIComponent(text) + "&tl=th";
    const audio = new Audio();
    audio.crossOrigin = "anonymous";
    audio.src = url;
    audio.setAttribute('playsinline', ''); // iOS inline 播放
    audio.autoplay = true;
    audio.play().catch(err => {
      console.warn('Audio play failed', err);
    });
  } catch (err) {
    console.error('TTS fallback error', err);
  }
}

// 在頁面載入時呼叫一次以解鎖音訊播放權限
function initAudioUnlock() {
  // 已存在則不重複建立
  if (document.getElementById('audioUnlockBtn')) return;

  const btn = document.createElement('button');
  btn.id = 'audioUnlockBtn';
  btn.textContent = '點我啟用語音';
  Object.assign(btn.style, {
    position: 'fixed',
    right: '12px',
    bottom: '12px',
    zIndex: 9999,
    padding: '10px 12px',
    borderRadius: '8px',
    background: '#fff',
    border: '1px solid #ccc',
    boxShadow: '0 2px 6px rgba(0,0,0,0.12)'
  });
  document.body.appendChild(btn);

  btn.addEventListener('click', () => {
    try {
      if ('speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance(''); // 空字串觸發解鎖
        window.speechSynthesis.speak(u);
      } else {
        const a = new Audio();
        a.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=';
        a.setAttribute('playsinline', '');
        a.play().catch(()=>{});
      }
    } catch (e) { /* ignore */ }
    btn.remove();
  }, { once: true });
}

// 呼叫一次初始化
initAudioUnlock();

/* ===== render with long-press detection and explicit toggle button ===== */
function renderButtons(){
  buttonsDiv.innerHTML = '';
  if (!words.length) {
    buttonsDiv.innerHTML = '<p style="color:#666">目前沒有生字，請新增。</p>';
    updateEditArea();
    renderReviewButtons();
    return;
  }

  words.forEach((w, index) => {
    const btn = document.createElement('button');
    btn.className = 'word-btn';
    btn.innerHTML = `<div style="pointer-events:none">${escapeHtml(w.th)}<span style="pointer-events:none">${escapeHtml(w.zh)}</span></div>`;
    btn.dataset.index = index;

    // explicit small toggle button
    const toggle = document.createElement('button');
    toggle.className = 'toggle-review';
    toggle.innerHTML = isInReview(w) ? '★' : '☆';
    if (isInReview(w)) toggle.classList.add('added');
    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleReviewByIndex(index);
    });
    btn.appendChild(toggle);

    // tap: speak + copy
    btn.addEventListener('click', () => {
      speak(w.th);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(w.th).catch(()=>{});
      }
    });

    // touch long-press detection (works without selecting text)
    let longPressTimer = null;
    const longPressDuration = 600; // ms

    btn.addEventListener('touchstart', (e) => {
      // prevent default to avoid text selection on some browsers
      e.preventDefault();
      longPressTimer = setTimeout(() => {
        toggleReviewByIndex(index);
      }, longPressDuration);
    }, { passive: false });

    btn.addEventListener('touchend', (e) => {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    });

    // also support mouse long-press for desktop
    btn.addEventListener('mousedown', (e) => {
      longPressTimer = setTimeout(() => {
        toggleReviewByIndex(index);
      }, longPressDuration);
    });
    btn.addEventListener('mouseup', () => {
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    });
    btn.addEventListener('mouseleave', () => {
      if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
    });

    buttonsDiv.appendChild(btn);
  });

  updateEditArea();
  renderReviewButtons();
}

function renderReviewButtons(){
  reviewArea.innerHTML = '<p style="color:#666">點擊右上星號加入或移除，或點按單字朗讀</p>';
  if (!reviewWords.length) return;
  reviewWords.forEach((w, index) => {
    const rb = document.createElement('button');
    rb.className = 'reviewBtn';
    rb.textContent = `${w.th} (${w.zh})`;

    rb.addEventListener('click', () => {
      speak(w.th);
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(w.th).catch(()=>{});
      }
    });

    // provide explicit remove via long-press or double-tap
    rb.addEventListener('contextmenu', (e) => { e.preventDefault(); reviewWords.splice(index,1); renderReviewButtons(); });
    let lastTap = 0;
    rb.addEventListener('touchend', () => {
      const now = Date.now();
      if (now - lastTap < 300) { reviewWords.splice(index,1); renderReviewButtons(); }
      lastTap = now;
    });

    reviewArea.appendChild(rb);
  });
}

/* ===== helpers ===== */
function updateEditArea(){ document.getElementById('editArea').value = JSON.stringify(words, null, 2); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, (m)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }
function isInReview(item){ return reviewWords.some(r => r.th === item.th); }
function toggleReviewByIndex(index){
  const w = words[index];
  const found = reviewWords.findIndex(r => r.th === w.th);
  if (found === -1) {
    reviewWords.push(w);
  } else {
    reviewWords.splice(found, 1);
  }
  renderButtons();
}

/* ===== actions ===== */
document.getElementById('generateBtn').addEventListener('click', () => {
  const th = document.getElementById('thaiInput').value.trim();
  const zh = document.getElementById('chineseInput').value.trim();
  if (!th || !zh) { alert("請輸入完整的泰文與中文解釋"); return; }
  words.push({ th, zh });
  renderButtons();
  document.getElementById('thaiInput').value = '';
  document.getElementById('chineseInput').value = '';
});

document.getElementById('autoTranslateBtn').addEventListener('click', async () => {
  const zh = document.getElementById('chineseOnlyInput').value.trim();
  if (!zh) { alert("請輸入中文解釋"); return; }
  const btn = document.getElementById('autoTranslateBtn');
  btn.disabled = true; btn.textContent = '翻譯中...';
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=th&dt=t&q=${encodeURIComponent(zh)}`;
    const res = await fetch(url);
    let data;
    try { data = await res.json(); } catch(e) { const txt = await res.text(); data = JSON.parse(txt || 'null'); }
    let th = "";
    if (Array.isArray(data) && Array.isArray(data[0]) && Array.isArray(data[0][0])) th = data[0][0][0] || "";
    if (!th) {
      alert("翻譯失敗，請改用手動輸入泰文");
      return;
    }
    words.push({ th, zh });
    renderButtons();
    document.getElementById('chineseOnlyInput').value = '';
  } catch(e) {
    console.error(e);
    alert("翻譯失敗，請稍後再試");
  } finally {
    btn.disabled = false; btn.textContent = '自動翻譯並生成按鈕';
  }
});

document.getElementById('saveBtn').addEventListener('click', () => {
  try { localStorage.setItem("thaiWords", JSON.stringify(words)); } catch(e){}
  try { localStorage.setItem("reviewWords", JSON.stringify(reviewWords)); } catch(e){}
  alert("已儲存，下次開啟仍會看到這些按鈕！");
});

document.getElementById('updateBtn').addEventListener('click', () => {
  try {
    const newWords = JSON.parse(document.getElementById('editArea').value);
    if (!Array.isArray(newWords)) { alert("格式錯誤，必須是陣列"); return; }
    for (const item of newWords) {
      if (typeof item.th !== 'string' || typeof item.zh !== 'string') { alert("每個項目必須包含 th 與 zh 字串欄位"); return; }
    }
    words = newWords;
    renderButtons();
  } catch (e) { alert("JSON 格式錯誤，請檢查編輯內容"); }
});


document.getElementById('clearReviewBtn').addEventListener('click', () => {
  if (!reviewWords.length) return;
  if (!confirm("確定要清除重溫區域嗎？")) return;
  reviewWords = [];
  renderReviewButtons();
  try { localStorage.removeItem("reviewWords"); } catch(e){}
});

window.addEventListener("beforeunload", function (e) {
  try {
    const saved = localStorage.getItem("thaiWords");
    if (saved !== JSON.stringify(words)) { e.preventDefault(); e.returnValue = ""; }
  } catch(e){}
});

/* initial render */
renderButtons();
</script>
</body>
</html>
