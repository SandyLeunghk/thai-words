<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>泰文生字（行動優化）</title>
<style>
  :root{
    --bg:#f6f8fb; --card:#fff; --muted:#6b7280; --accent:#2563eb;
    --radius:12px; --gap:12px; --touch:48px;
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans",Arial;
    background:var(--bg); color:#0f1724; -webkit-font-smoothing:antialiased;
    padding:12px 12px 84px; /* bottom padding for sticky player */
  }
  header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
  h1{font-size:18px;margin:0}
  .subtitle{font-size:13px;color:var(--muted);margin:0}
  /* list */
  .list{display:flex;flex-direction:column;gap:10px}
  .card{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px;border-radius:var(--radius);background:var(--card);
    box-shadow:0 6px 18px rgba(2,6,23,0.06); border:1px solid rgba(2,6,23,0.04);
    min-height:64px; gap:10px;
  }
  .left{display:flex;flex-direction:column;gap:6px}
  .th{font-size:18px;font-weight:700}
  .zh{font-size:14px;color:var(--muted)}
  .actions{display:flex;gap:8px;align-items:center}
  .btn{
    height:var(--touch); min-width:var(--touch); padding:0 12px; border-radius:10px;
    border:0;background:linear-gradient(90deg,var(--accent),#4f46e5); color:#fff;
    font-weight:600; display:flex;align-items:center;justify-content:center; cursor:pointer;
  }
  .btn.ghost{background:#fff;color:var(--accent);border:1px solid rgba(37,99,235,0.12)}
  .star{height:44px;width:44px;border-radius:10px;border:1px solid rgba(0,0,0,0.06);background:#fff;display:flex;align-items:center;justify-content:center;font-size:18px}
  .star.added{background:#fff7d6;border-color:#d4a017;color:#b45309}
  /* sticky player bottom */
  .player{
    position:fixed; left:12px; right:12px; bottom:12px; height:60px;
    background:linear-gradient(180deg,#fff,#fbfdff); border-radius:14px;
    box-shadow:0 12px 30px rgba(2,6,23,0.12); display:flex;align-items:center;gap:12px;padding:8px 12px;
    border:1px solid rgba(2,6,23,0.04); z-index:9999;
  }
  .player .play{height:44px;width:44px;border-radius:10px;background:linear-gradient(90deg,var(--accent),#7c3aed);color:#fff;border:0;display:flex;align-items:center;justify-content:center;font-size:18px}
  .player .label{flex:1; font-size:14px; color:#0b1220; font-weight:600}
  .player .sub{font-size:12px;color:var(--muted)}
  /* form */
  .form{display:flex;flex-direction:column;gap:8px;margin-top:10px}
  input[type="text"], textarea{
    width:100%; padding:12px; border-radius:10px; border:1px solid rgba(2,6,23,0.06); font-size:14px;
    background:#fff;
  }
  textarea{height:100px; font-family:inherit}
  .row{display:flex;gap:8px}
  .row .flex{flex:1}
  /* small helpers */
  .muted{color:var(--muted);font-size:13px}
  @media(min-width:720px){
    body{padding:18px 18px 100px}
    .card{min-height:72px}
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>泰文生字</h1>
    <p class="subtitle">點擊播放；點星號加入重溫</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button id="saveBtn" class="btn ghost" style="height:40px;padding:8px 10px">儲存</button>
    <button id="exportBtn" class="btn ghost" style="height:40px;padding:8px 10px">匯出</button>
  </div>
</header>

<main>
  <section class="list" id="listArea" aria-label="生字列表"></section>

  <section class="form" aria-label="新增">
    <input id="thaiInput" placeholder="輸入泰文（手動）">
    <input id="chineseInput" placeholder="輸入中文解釋（手動）">
    <div class="row">
      <button id="generateBtn" class="btn" style="flex:1">生成按鈕</button>
      <button id="autoTranslateBtn" class="btn ghost" style="width:120px">自動翻譯</button>
    </div>
    <input id="chineseOnlyInput" placeholder="只輸入中文，自動翻譯成泰文">
  </section>

  <section style="margin-top:10px">
    <textarea id="editArea" placeholder='進階編輯：格式 [{"th":"ดูหนัง","zh":"看電影"}]'></textarea>
    <div class="row" style="margin-top:8px">
      <button id="updateBtn" class="btn" style="flex:1">更新清單</button>
      <button id="clearReviewBtn" class="btn ghost" style="width:120px">清除重溫</button>
    </div>
  </section>

  <p class="muted" style="margin-top:12px">提示：首次使用請按下底部「啟用語音」以解鎖播放權限。</p>
</main>

<!-- sticky player -->
<div class="player" id="player">
  <button id="playerPlay" class="play">▶</button>
  <div>
    <div class="label" id="playerLabel">尚未播放</div>
    <div class="sub" id="playerSub">點選任一單字開始朗讀</div>
  </div>
  <button id="audioUnlock" class="btn ghost" style="height:40px;padding:8px 10px">啟用語音</button>
</div>

<script>
/* ===== Data ===== */
let words = [
  { th: "ดูหนัง", zh: "看電影" },
  { th: "เรียน", zh: "學習" },
  { th: "เป็นหมอ", zh: "當醫生" },
  { th: "พักผ่อน", zh: "休息" }
];
let reviewWords = [];
let current = null;

/* load saved */
try { const s = localStorage.getItem("thaiWords"); if (s) words = JSON.parse(s); } catch(e){}
try { const r = localStorage.getItem("reviewWords"); if (r) reviewWords = JSON.parse(r); } catch(e){}

/* elements */
const listArea = document.getElementById('listArea');
const playerLabel = document.getElementById('playerLabel');
const playerSub = document.getElementById('playerSub');
const playerPlay = document.getElementById('playerPlay');

/* ===== Speech (priority) ===== */
function speak(text){
  if ('speechSynthesis' in window) {
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'th-TH';
      u.rate = 0.95;
      u.pitch = 1;
      u.volume = 1;
      window.speechSynthesis.speak(u);
      return;
    } catch(e){ console.warn(e); }
  }
  // fallback
  try {
    const url = "https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&q=" + encodeURIComponent(text) + "&tl=th";
    const audio = new Audio();
    audio.crossOrigin = "anonymous";
    audio.src = url;
    audio.setAttribute('playsinline','');
    audio.play().catch(()=>{});
  } catch(e){ console.error(e); }
}

/* unlock audio button */
document.getElementById('audioUnlock').addEventListener('click', () => {
  try {
    if ('speechSynthesis' in window) {
      const u = new SpeechSynthesisUtterance('');
      window.speechSynthesis.speak(u);
    } else {
      const a = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=');
      a.setAttribute('playsinline','');
      a.play().catch(()=>{});
    }
  } catch(e){}
  document.getElementById('audioUnlock').textContent = '已啟用';
  document.getElementById('audioUnlock').disabled = true;
});

/* ===== Render list (mobile friendly cards) ===== */
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, (m)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function renderList(){
  listArea.innerHTML = '';
  words.forEach((w, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="left">
        <div class="th">${escapeHtml(w.th)}</div>
        <div class="zh">${escapeHtml(w.zh)}</div>
      </div>
      <div class="actions">
        <button class="star" aria-label="加入重溫">${isInReview(w) ? '★' : '☆'}</button>
        <button class="btn playBtn" aria-label="播放">▶</button>
      </div>
    `;
    // play button
    card.querySelector('.playBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      current = w;
      playerLabel.textContent = w.th;
      playerSub.textContent = w.zh;
      speak(w.th);
      try { navigator.vibrate && navigator.vibrate(20); } catch(e){}
    });
    // star toggle
    const star = card.querySelector('.star');
    if (isInReview(w)) star.classList.add('added');
    star.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleReviewByWord(w);
      renderList();
    });
    // card tap also plays
    card.addEventListener('click', () => {
      current = w;
      playerLabel.textContent = w.th;
      playerSub.textContent = w.zh;
      speak(w.th);
    });
    listArea.appendChild(card);
  });
  updateEditArea();
  renderReviewChips();
}

/* ===== Review chips ===== */
function renderReviewChips(){
  // show count in player sub if any
  const count = reviewWords.length;
  if (count) playerSub.textContent = `${count} 個重溫`;
}

/* ===== helpers ===== */
function isInReview(item){ return reviewWords.some(r => r.th === item.th); }
function toggleReviewByWord(w){
  const idx = reviewWords.findIndex(r => r.th === w.th);
  if (idx === -1) reviewWords.push(w); else reviewWords.splice(idx,1);
  try { localStorage.setItem("reviewWords", JSON.stringify(reviewWords)); } catch(e){}
}

/* ===== actions ===== */
document.getElementById('generateBtn').addEventListener('click', () => {
  const th = document.getElementById('thaiInput').value.trim();
  const zh = document.getElementById('chineseInput').value.trim();
  if (!th || !zh) { alert("請輸入泰文與中文解釋"); return; }
  words.unshift({ th, zh }); // 新增到最上方
  document.getElementById('thaiInput').value = '';
  document.getElementById('chineseInput').value = '';
  renderList();
});

document.getElementById('autoTranslateBtn').addEventListener('click', async () => {
  const zh = document.getElementById('chineseOnlyInput').value.trim();
  if (!zh) { alert("請輸入中文解釋"); return; }
  const btn = document.getElementById('autoTranslateBtn');
  btn.disabled = true; btn.textContent = '翻譯中...';
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=th&dt=t&q=${encodeURIComponent(zh)}`;
    const res = await fetch(url);
    let data;
    try { data = await res.json(); } catch(e) { const txt = await res.text(); data = JSON.parse(txt || 'null'); }
    let th = "";
    if (Array.isArray(data) && Array.isArray(data[0]) && Array.isArray(data[0][0])) th = data[0][0][0] || "";
    if (!th) { alert("翻譯失敗，請改用手動輸入泰文"); return; }
    words.unshift({ th, zh });
    document.getElementById('chineseOnlyInput').value = '';
    renderList();
  } catch(e) { console.error(e); alert("翻譯失敗"); }
  finally { btn.disabled = false; btn.textContent = '自動翻譯'; }
});

document.getElementById('saveBtn').addEventListener('click', () => {
  try { localStorage.setItem("thaiWords", JSON.stringify(words)); } catch(e){}
  try { localStorage.setItem("reviewWords", JSON.stringify(reviewWords)); } catch(e){}
  alert("已儲存");
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const content = JSON.stringify(words, null, 2);
  const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = "thai_words.txt"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
});

document.getElementById('updateBtn').addEventListener('click', () => {
  try {
    const newWords = JSON.parse(document.getElementById('editArea').value);
    if (!Array.isArray(newWords)) { alert("格式錯誤，必須是陣列"); return; }
    words = newWords;
    renderList();
  } catch(e){ alert("JSON 格式錯誤"); }
});

document.getElementById('clearReviewBtn').addEventListener('click', () => {
  if (!confirm("確定要清除重溫區域嗎？")) return;
  reviewWords = [];
  try { localStorage.removeItem("reviewWords"); } catch(e){}
  renderList();
});

/* player controls */
playerPlay.addEventListener('click', () => {
  if (!current) { alert("請先選擇一個單字播放"); return; }
  speak(current.th);
});

/* edit area helper */
function updateEditArea(){ document.getElementById('editArea').value = JSON.stringify(words, null, 2); }

/* beforeunload warning */
window.addEventListener("beforeunload", function (e) {
  try {
    const saved = localStorage.getItem("thaiWords");
    if (saved !== JSON.stringify(words)) { e.preventDefault(); e.returnValue = ""; }
  } catch(e){}
});

/* initial render */
renderList();
updateEditArea();
</script>
</body>
</html>
